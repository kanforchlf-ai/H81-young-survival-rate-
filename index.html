const COLOR = {

};
const YEAR_COLOR = ['#3d6afc','#ff6b35','#10b981','#f59e0b'];
const YEARS = ['2022','2023','2024','2025'];

function level(p) {
  if (p >= 50) return ['high','穩定'];
  if (p >= 25) return ['mid','偶爾'];
  return ['low','稀少'];
}

// Stats
const statsRow = document.getElementById('statsRow');
const total = RAW.length;
const stable = RAW.filter(d => d['出席率'] >= 50).length;
const avg = (RAW.reduce((s,d) => s + d['出席率'], 0) / total).toFixed(1);
const byYear = {};
YEARS.forEach(y => byYear[y] = RAW.filter(d => d['加入年'] === y));

[
  { num: total, label: '總人數' },
  { num: stable, label: '出席率 ≥ 50%（穩定）' },
  { num: avg + '%', label: '平均出席率' },
  { num: byYear['2023']?.length || 0, label: '2023年加入' },
  { num: byYear['2024']?.length || 0, label: '2024年加入' },
  { num: byYear['2025']?.length || 0, label: '2025年加入' },
].forEach(s => {
  statsRow.innerHTML += `<div class="stat-card"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`;
});

  type: 'bar',
  data: {
    labels: YEARS,
    datasets: [{
      label: '加入人數',

      backgroundColor: YEAR_COLOR,
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },

// Chart: distribution histogram

const bucketData = new Array(9).fill(0);
RAW.forEach(d => {
  const p = d['出席率'];
  const i = p >= 80 ? 8 : Math.floor(p / 10);
  bucketData[Math.min(i, 8)]++;
});
new Chart(document.getElementById('chartDist'), {
  type: 'bar',
  data: {
    labels: buckets,
    datasets: [{
      label: '人數',
      data: bucketData,
      backgroundColor: bucketData.map((_, i) => i >= 5 ? '#10b981' : i >= 2 ? '#f59e0b' : '#ff6b35'),
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { y: { beginAtZero: true, ticks: { stepSize: 2 } } }
  }
});

// Pie charts per year
const pieRow = document.getElementById('pieRow');
YEARS.forEach((y, yi) => {
  const members = byYear[y] || [];
  if (!members.length) return;
  const hi = members.filter(d => d['出席率'] >= 50).length;
  const mi = members.filter(d => d['出席率'] >= 25 && d['出席率'] < 50).length;
  const lo = members.filter(d => d['出席率'] < 25).length;
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center';
  div.innerHTML = `<p style="font-weight:600;margin-bottom:8px;font-size:.9rem">${y}年（${members.length}人）</p><canvas id="pie${y}" height="180"></canvas>`;
  pieRow.appendChild(div);
  setTimeout(() => {
    new Chart(document.getElementById('pie' + y), {
      type: 'pie',
      data: {
        labels: ['穩定(≥50%)', '偶爾(25-49%)', '稀少(<25%)'],
        datasets: [{ data: [hi, mi, lo], backgroundColor: ['#10b981','#f59e0b','#ff6b35'] }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
    });
  }, 0);
});

// Filter buttons
let activeYear = 'all';
const filterBtns = document.getElementById('filterBtns');
[['all','全部'], ...YEARS.map(y => [y, y + '年'])].forEach(([val, label]) => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (val === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => {
    activeYear = val;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  };
  filterBtns.appendChild(btn);
});

function renderTable() {
  const filtered = activeYear === 'all' ? RAW : RAW.filter(d => d['加入年'] === activeYear);
  const sorted = [...filtered].sort((a, b) => b['出席率'] - a['出席率']);
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = sorted.map(d => {
    const p = d['出席率'];
    const [lvl, lvlLabel] = level(p);
    const color = lvl === 'high' ? '#10b981' : lvl === 'mid' ? '#f59e0b' : '#ff6b35';
    return `<tr>
      <td><strong>${d['姓名']}</strong></td>
      <td>${d['小區']}</td>
      <td>${d['排'] || '—'}</td>
      <td>${d['首次出席']}</td>
      <td>${d['加入年']}年</td>
      <td>${d['出席數']}/${d['總週數']}</td>
      <td>
        <div class="pct-bar">
          <div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div>
          <span style="min-width:38px;font-weight:600">${p}%</span>
        </div>
      </td>
      <td><span class="badge badge-${lvl}">${lvlLabel}</span></td>
    </tr>`;
  }).join('');
}
