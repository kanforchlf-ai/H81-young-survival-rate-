<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>81 青年區大學生 — 年級分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'PingFang TC','Microsoft JhengHei',sans-serif; background:#f4f6fa; color:#222; }
header { background:#1a2340; color:#fff; padding:22px 32px 16px; }
header h1 { font-size:1.35rem; font-weight:700; }
header p  { margin-top:5px; font-size:.82rem; opacity:.7; }
.container { max-width:1100px; margin:0 auto; padding:24px 20px 60px; }
a.back { display:inline-block; margin-bottom:16px; color:#3d6afc; font-size:.85rem; text-decoration:none; }
a.back:hover { text-decoration:underline; }

.grade-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
.gcard { background:#fff; border-radius:12px; padding:16px 18px 14px; box-shadow:0 1px 4px rgba(0,0,0,.08); border-top:4px solid; }
.gcard .grade-label { font-size:.78rem; font-weight:700; margin-bottom:8px; }
.gcard .big-num { font-size:1.9rem; font-weight:800; line-height:1; }
.gcard .sub-row { display:flex; justify-content:space-between; margin-top:10px; font-size:.75rem; color:#666; }
.gcard .sub-row span { text-align:center; }
.gcard .sub-row b { display:block; font-size:.95rem; font-weight:700; color:#1a2340; }

.section { background:#fff; border-radius:12px; padding:20px 24px; margin-bottom:24px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.section h2 { font-size:1rem; font-weight:700; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid #f0f0f0; }

.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
.chart-box { background:#fff; border-radius:12px; padding:20px 24px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.chart-box h2 { font-size:1rem; font-weight:700; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid #f0f0f0; }
canvas { max-width:100%; }

/* survival annotation */
.half-life-row { display:flex; gap:16px; flex-wrap:wrap; margin-top:14px; }
.hl-item { display:flex; align-items:center; gap:6px; font-size:.8rem; }
.hl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* members table */
.tab-btns { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.tab-btn { padding:6px 16px; border-radius:20px; border:1.5px solid #ddd; background:#fff;
            font-size:.8rem; cursor:pointer; font-weight:600; transition:all .15s; }
.tab-btn.active { color:#fff; border-color:transparent; }
table.mtbl { width:100%; border-collapse:collapse; font-size:.82rem; }
table.mtbl th { background:#f8fafc; padding:8px 10px; text-align:left; font-weight:600; color:#555;
                 border-bottom:2px solid #e5e7eb; white-space:nowrap; }
table.mtbl td { padding:7px 10px; border-bottom:1px solid #f0f0f0; }
table.mtbl tr:hover td { background:#f8fafc; }
.badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:.72rem; font-weight:700; }
.rate-bar { display:flex; align-items:center; gap:6px; }
.rate-track { width:80px; height:7px; background:#e5e7eb; border-radius:4px; overflow:hidden; flex-shrink:0; }
.rate-fill { height:100%; border-radius:4px; }
.dot-drop { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }

/* cohort stacked */
.cohort-bars { margin-top:10px; }
.cb-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:.8rem; }
.cb-label { width:32px; font-weight:700; color:#1a2340; }
.cb-track { flex:1; height:22px; background:#f0f0f0; border-radius:4px; display:flex; overflow:hidden; }
.cb-seg { height:100%; display:flex; align-items:center; justify-content:center; font-size:.68rem; color:#fff; font-weight:700; min-width:0; }

@media(max-width:700px){
  .grade-cards { grid-template-columns:repeat(2,1fr); }
  .chart-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<header>
  <h1>81 青年區大學生 — 年級出席與存活分析</h1>
  <p>以 2026 年 4 月為基準推算年級 · 共 41 人（Option C 穩定成員）</p>
</header>
<div class="container">
  <a class="back" href="index.html">← 回存活率總覽</a>

  <!-- Grade Cards -->
  <div class="grade-cards" id="gradeCards"></div>

  <!-- Charts -->
  <div class="chart-row">
    <div class="chart-box">
      <h2>存活曲線（各年級）</h2>
      <canvas id="survivalChart" height="260"></canvas>
      <div class="half-life-row" id="halfLifeRow"></div>
    </div>
    <div class="chart-box">
      <h2>出席率分佈（近半年 vs 歷史均值）</h2>
      <canvas id="attendChart" height="260"></canvas>
    </div>
  </div>

  <!-- Drift ratio -->
  <div class="section">
    <h2>各年級出席狀態分佈</h2>
    <p style="font-size:.78rem;color:#888;margin-bottom:16px;">流失定義：曾有任何52週出席率 ≥50%，但近半年 &lt;50%</p>
    <div id="driftBars"></div>
  </div>

  <!-- Member detail table -->
  <div class="section">
    <h2>個人明細</h2>
    <div class="tab-btns" id="tabBtns"></div>
    <table class="mtbl">
      <thead><tr>
        <th>年級</th><th>姓名</th><th>加入年</th>
        <th>歷史出席率</th><th>近半年</th><th>狀態</th>
      </tr></thead>
      <tbody id="memberTbody"></tbody>
    </table>
  </div>
</div>

      <td style="color:${recentColor};font-weight:700">${m.recent_rate}%</td>
      <td>
        <span class="dot-drop" style="background:${dropped?'#dc2626':'#10b981'}"></span>
        ${dropped ? '第'+m.dropout_week+'週流失' : '從未流失'}
      </td>`;
    tbody.appendChild(tr);
  });
}

// Tab buttons
const totalN = GRADES.reduce((s,g)=>s+GRADE_DATA[g].n,0);
[['all','全部（'+totalN+'人）'], ...GRADES.map(g => [g,g+'（'+GRADE_DATA[g].n+'人）'])].forEach(([val,label]) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (val==='all'?' active':'');
  btn.textContent = label;
  if(val==='all') btn.style.cssText = 'background:#1a2340;color:#fff;border-color:#1a2340;';
  else btn.style.cssText = `color:${COLORS[val]||'#1a2340'};border-color:${COLORS[val]||'#ddd'};`;
  btn.onclick = () => {
    activeGrade = val;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      if(b===btn) b.classList.add('active');
    });
    if(val==='all') btn.style.cssText='background:#1a2340;color:#fff;border-color:#1a2340;';
    renderTable(val);
  };
  tabBtns.appendChild(btn);
});

renderTable('all');
</script>
</body>
</html>
